<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<meta name="author" content="tapioca">
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  if (id) {
    location.replace('posts/' + encodeURIComponent(id) + '.html');
  }
})();
</script>
<meta property="og:type" content="article">
<meta property="og:url" content="https://tapiokr.github.io/tapioka/post.html">
<meta name="twitter:card" content="summary">

<title>tapioca.txt</title>
<link rel="stylesheet" href="estilo.css">
</head>
<body>
<header>
  <h1>🍡 tapioca.txt</h1>
  <nav>
    <a href="index.html">inicio</a>
    <a href="sobre.html">sobre</a>
  </nav>
</header>

<main>
  <div id="post"></div>
  <a class="voltar" href="index.html">← voltar</a>
</main>

<footer>
  <small>sem cookies, sem rastreio, sem servidor.</small>
</footer>

<script src="posts.js?v=2"></script>
<script>
(function() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const container = document.getElementById('post');

  if (!id || !window.POSTS) {
    container.innerHTML = '<p>post nao encontrado.</p>';
    return;
  }

  const post = POSTS.find(p => p.id === id);
  if (!post) {
    container.innerHTML = '<p>post nao encontrado.</p>';
    return;
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  function setMeta(name, content) {
    let tag = document.querySelector('meta[property="' + name + '"]') || document.querySelector('meta[name="' + name + '"]');
    if (!tag) {
      tag = document.createElement('meta');
      if (name.startsWith('og:')) tag.setAttribute('property', name);
      else tag.setAttribute('name', name);
      document.head.appendChild(tag);
    }
    tag.content = content;
  }

  loadScript(post.script).then(() => {
    const key = '__post_' + post.id;
    const texto = window[key] || '';
    if (!texto) {
      container.innerHTML = '<p>conteudo nao carregado. verifique se o arquivo <code>posts/' + post.id + '.js</code> esta correto.</p>';
      return;
    }

    const data = post.date ? `<time datetime="${post.date}">${post.date}</time>` : '';
    const tags = (post.tags || []).map(t => `<span class="tag">${t}</span>`).join(' ');
    function mdInline(s) {
      return s
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    const blocos = texto.split(/\n\n+/).map(l => l.trim()).filter(Boolean);
    const paragrafos = blocos.map(l => {
      const m = l.match(/^\*\*\s*(.+?)\s*\*\*$/);
      if (m) return `<h2>${m[1]}</h2>`;
      if (l.startsWith('- ') || l.startsWith('* ')) {
        const itens = l.split(/\n/).filter(i => i.trim()).map(i => `<li>${mdInline(i.replace(/^[-*]\s+/, ''))}</li>`).join('');
        return `<ul>${itens}</ul>`;
      }
      return `<p>${mdInline(l.replace(/\n/g, '<br>'))}</p>`;
    }).join('\n');

    container.innerHTML = `<article class="post-conteudo" itemscope itemtype="https://schema.org/Article">
      <h1 itemprop="headline">${post.title}</h1>
      <div class="meta">
        ${data}
        <span itemprop="author" itemscope itemtype="https://schema.org/Person"><span itemprop="name">tapioca</span></span>
        ${tags}
      </div>
      <div itemprop="articleBody">
        ${paragrafos}
      </div>
    </article>`;

    document.title = post.title + ' — tapioca.txt';
    setMeta('description', texto.substring(0, 160).replace(/\n/g, ' '));
    setMeta('og:title', post.title + ' — tapioca.txt');
    setMeta('og:description', texto.substring(0, 160).replace(/\n/g, ' '));
    setMeta('canonical', 'https://tapiokr.github.io/tapioka/posts/' + post.id + '.html');

    const linkCanon = document.querySelector('link[rel="canonical"]') || document.createElement('link');
    linkCanon.rel = 'canonical';
    linkCanon.href = 'https://tapiokr.github.io/tapioka/posts/' + post.id + '.html';
    if (!document.querySelector('link[rel="canonical"]')) document.head.appendChild(linkCanon);
  }).catch(() => {
    container.innerHTML = '<p>erro ao carregar o post. verifique se o arquivo <code>posts/' + post.id + '.js</code> existe.</p>';
  });
})();
</script>
</body>
</html>
